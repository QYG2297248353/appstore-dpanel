networks:
  1panel-network:
    external: true
services:
  mcsmanager-daemon:
    container_name: mcsmanager
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: githubyumao/mcsmanager-daemon:v10.16.2
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_API}:24444
    restart: always
    volumes:
    - /etc/timezone:/etc/timezone:ro
    - /etc/localtime:/etc/localtime:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${MCSMANAGER_ROOT_PATH}/daemon/data:/opt/mcsmanager/daemon/data
    - ${MCSMANAGER_ROOT_PATH}/daemon/logs:/opt/mcsmanager/daemon/logs
  mcsmanager-web:
    container_name: web-mcsmanager
    depends_on:
    - mcsmanager-daemon
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: githubyumao/mcsmanager-web:v10.16.2
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:23333
    restart: always
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - ${MCSMANAGER_ROOT_PATH}/web/data:/opt/mcsmanager/web/data
    - ${MCSMANAGER_ROOT_PATH}/web/logs:/opt/mcsmanager/web/logs
    - ${MCSMANAGER_ROOT_PATH}/daemon:/opt/mcsmanager/daemon
