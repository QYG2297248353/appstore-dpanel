networks:
  1panel-network:
    external: true
services:
  mcsmanager-web:
    container_name: mcsmanager-web
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: githubyumao/mcsmanager-web:v10.16.2
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:23333
    restart: always
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - ${MCSMANAGER_ROOT_PATH}/web/data:/opt/mcsmanager/web/data
    - ${MCSMANAGER_ROOT_PATH}/web/logs:/opt/mcsmanager/web/logs
