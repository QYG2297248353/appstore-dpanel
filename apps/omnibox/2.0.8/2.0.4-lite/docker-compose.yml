networks:
  1panel-network:
    external: true
services:
  omnibox-lite:
    container_name: 2.0.8
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    - SERVER_PORT=7023
    - DATABASE_TYPE=sqlite
    image: lampon/omnibox:v2.0.8-lite
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:7023
    restart: always
    volumes:
    - ${OMNIBOX_ROOT_PATH}/data:/app/data
