networks:
  1panel-network:
    external: true
services:
  openclaw-zh:
    container_name: openclaw-zh
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: 1186258278/openclaw-zh:latest
    init: true
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:18789
    restart: always
    volumes:
    - ${OPENCLAW_ROOT_PATH}/data:/root/.openclaw
