networks:
  1panel-network:
    external: true
services:
  omniroute:
    container_name: omniroute
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: diegosouzapw/omniroute:3.8.46
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:20128
    restart: always
    volumes:
    - ${OMNIROUTE_ROOT_PATH}/data:/app/data
