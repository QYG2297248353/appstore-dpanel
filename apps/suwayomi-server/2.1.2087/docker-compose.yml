networks:
  1panel-network:
    external: true
services:
  suwayomi-server:
    container_name: suwayomi-server
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: ghcr.io/suwayomi/suwayomi-server:v2.1.2087
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:4567
    restart: always
    volumes:
    - ${SUWAYOMI_SERVER_ROOT_PATH}/data:/home/suwayomi/.local/share/Tachidesk
