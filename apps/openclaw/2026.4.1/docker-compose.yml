networks:
  1panel-network:
    external: true
services:
  openclaw:
    command:
    - node
    - dist/index.js
    - gateway
    - --bind
    - ${OPENCLAW_GATEWAY_BIND:-lan}
    - --port
    - '18789'
    container_name: openclaw
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    - HOME=/home/node
    - TERM=xterm-256color
    - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      timeout: 5s
    image: ghcr.io/openclaw/openclaw:2026.4.1
    init: true
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:18789
    - ${PANEL_APP_PORT_RPC}:18790
    restart: always
    user: node:node
    volumes:
    - ${OPENCLAW_ROOT_PATH}/data/config:/home/node/.openclaw
    - ${OPENCLAW_ROOT_PATH}/data/workspace:/home/node/.openclaw/workspace
    - ${OPENCLAW_ROOT_PATH}/data/ms-playwright:/home/node/.cache/ms-playwright
