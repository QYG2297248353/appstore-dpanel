networks:
  1panel-network:
    external: true
services:
  nezha:
    container_name: nezha
    environment:
    - TZ=Asia/Shanghai
    image: ghcr.io/nezhahq/nezha:v2.2.10
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:8008
    restart: always
    volumes:
    - ${NEZHA_ROOT_PATH}/data:/dashboard/data
