networks:
  1panel-network:
    external: true
services:
  mcsmanager-daemon:
    container_name: mcsmanager-daemon
    env_file:
    - ./envs/global.env
    - .env
    environment:
    - TZ=Asia/Shanghai
    image: githubyumao/mcsmanager-daemon:v10.16.3
    labels:
      createdBy: Apps
    networks:
    - 1panel-network
    ports:
    - ${PANEL_APP_PORT_HTTP}:24444
    restart: always
    volumes:
    - /etc/timezone:/etc/timezone:ro
    - /etc/localtime:/etc/localtime:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${MCSMANAGER_ROOT_PATH}/daemon/data:/opt/mcsmanager/daemon/data
    - ${MCSMANAGER_ROOT_PATH}/daemon/logs:/opt/mcsmanager/daemon/logs
